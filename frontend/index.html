<!doctype html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <link rel="icon" type="image/svg+xml" href="/vite.svg" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <!-- Prevent Flash of Light Mode (FOUC) and Critical CSS -->
  <style>
    :root {
      color-scheme: light;
      --theme-bg: #EFE9E0;
      --theme-text: #1C1712;
      --theme-surface: #FAF6F0;
      --theme-border: #D8CDBC;
      --theme-primary: #A8692E;
      --theme-primary-text: #FFFFFF;
    }
    .dark {
      color-scheme: dark;
      --theme-bg: #161412;
      --theme-text: #EAE6E1;
      --theme-surface: #221E1A;
      --theme-border: #36302A;
      --theme-primary: #D4A373;
      --theme-primary-text: #161412;
    }
    html, body {
      background-color: var(--theme-bg);
      color: var(--theme-text);
      margin: 0;
      padding: 0;
    }
  </style>
  <script>
    (function () {
      try {
        var saved = localStorage.getItem('portfolio_theme');
        var theme = 'dark';
        if (saved === 'light' || saved === 'dark') {
          theme = saved;
        } else if (window.matchMedia && window.matchMedia('(prefers-color-scheme: light)').matches) {
          theme = 'light';
        }
        if (theme === 'dark') document.documentElement.classList.add('dark');
        else document.documentElement.classList.remove('dark');
      } catch (e) { }
    })();
  </script>

  <!-- Preload Critical Assets (LCP Enhancement) -->
  <link rel="preload" as="image" href="/profile.webp" type="image/webp" fetchpriority="high" />

  <!-- Fonts (Asynchronous to eliminate Render Blocking) -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link
    href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&family=Montserrat:ital,wght@0,100..900;1,100..900&display=swap"
    rel="preload" as="style">
  <link
    href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&family=Montserrat:ital,wght@0,100..900;1,100..900&display=swap"
    rel="stylesheet" media="print" onload="this.media='all'">
  <noscript>
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&family=Montserrat:ital,wght@0,100..900;1,100..900&display=swap"
      rel="stylesheet">
  </noscript>

  <!-- SEO Meta Tags -->
  <title>Argenis Lopez | Backend Developer Portfolio</title>
  <meta name="description"
    content="Professional portfolio of Argenis Lopez, a Backend Developer specializing in Python, FastAPI, and Clean Architecture." />
  <link rel="canonical" href="https://portfolio-argenis1412s-projects.vercel.app/" />
  <meta property="og:title" content="Argenis Lopez | Backend Developer Portfolio" />
  <meta property="og:description"
    content="Professional portfolio showcasing high-performance backend systems and clean architectural patterns." />
  <meta property="og:type" content="website" />
  <meta property="og:url" content="https://portfolio-argenis1412s-projects.vercel.app/" />
  <meta property="og:image" content="https://portfolio-argenis1412s-projects.vercel.app/og-image.jpg" />
  <meta property="og:image:width" content="1200" />
  <meta property="og:image:height" content="630" />
  <meta property="og:image:type" content="image/jpeg" />
  <meta name="twitter:card" content="summary_large_image" />
  <meta name="twitter:title" content="Argenis Lopez | Backend Developer Portfolio" />
  <meta name="twitter:image" content="https://portfolio-argenis1412s-projects.vercel.app/og-image.jpg" />
  <meta name="theme-color" content="#121212" />

</head>

<body>

</body>

</html>
