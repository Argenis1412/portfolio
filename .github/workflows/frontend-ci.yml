name: ⚛️ Frontend CI

on:
  push:
    branches: [main, develop, 'feature/**']
    paths:
      - 'frontend/**'
      - '.github/workflows/frontend-ci.yml'
  pull_request:
    branches: [main, develop, 'feature/**']
    paths:
      - 'frontend/**'

jobs:
  test:
    name: 🧪 Testes React
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node-version: [20]

    steps:
      - name: 📥 Checkout código
        uses: actions/checkout@v4

      - name: 📦 Configurar Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: 📦 Instalar dependências
        run: |
          cd frontend
          npm ci

      - name: 🧪 Executar testes
        run: |
          cd frontend
          npm run test

      - name: 🏗️ Build produção
        run: |
          cd frontend
          npm run build

  lint:
    name: 🧹 Linting
    runs-on: ubuntu-latest

    steps:
      - name: 📥 Checkout código
        uses: actions/checkout@v4

      - name: 📦 Configurar Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: 📦 Instalar dependências
        run: |
          cd frontend
          npm ci

      - name: 🔍 ESLint
        run: |
          cd frontend
          npm run lint

      - name: 🔒 Verificar placeholders hardcodeados
        run: |
          cd ..
          if grep -qrn --exclude-dir=".github" "https://seudominio.com" .; then
            echo "❌ ERROR: Placeholder 'https://seudominio.com' encontrado. Usa variables de entorno."
            exit 1
          fi
