name: Keep Backend Alive

on:
  schedule:
    # Execute every 4 minutes to ensure backend doesn't sleep
    - cron: "*/4 * * * *"
  workflow_dispatch: # Allows manual execution

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping Backend API
        run: |
          # We ping the /saude endpoint because it executes a real SELECT 1 on PostgreSQL.
          # This keeps both the backend and DB active, avoiding cold starts.
          # The first ping of the day might take longer if the instance is sleeping.
          curl -sS -o /dev/null -w "%{http_code}" --retry 2 --retry-delay 5 --max-time 60 https://argenisbackend.com/saude || true
