name: Keep Backend Alive

on:
  schedule:
    # Executa a cada 5 minutos para garantir que o backend não durma
    - cron: "*/5 * * * *"
  workflow_dispatch: # Permite executar manualmente

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping Backend API
        run: |
          # Fazemos uma requisição simples ao endpoint /sobre para manter a instância viva.
          # Usamos --max-time 30 porque se estiver dormindo, demorará para responder ao primeiro ping.
          # -sSf suprime a saída, mas falha em caso de erro HTTP (embora se for 503, podemos querer ignorá-lo).
          # Adicionamos || true para que um eventual erro (ex: se o Koyeb estiver desligado) não faça a Action falhar sempre e encha nossa caixa de e-mails.
          curl -s -o /dev/null -w "%{http_code}" --max-time 30 https://reluctant-sharia-argenis1412-98799132.koyeb.app/api/v1/sobre || true
