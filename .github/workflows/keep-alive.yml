name: Keep Backend Alive

on:
  schedule:
    # Ejecuta cada 14 minutos para asegurar que el contenedor Eco de Koyeb no se duerma
    - cron: "*/14 * * * *"
  workflow_dispatch: # Permite ejecutarlo manualmente

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping Backend API
        run: |
          # Hacemos una petición simple al endpoint /sobre para mantener viva la instancia.
          # Usamos --max-time 30 porque si está dormido, tardará en responder al primer ping.
          # -sSf suprime salida pero falla en caso de error HTTP (aunque si es 503, podríamos querer ignorarlo).
          # Añadimos || true para que un eventual error (ej: si Koyeb está apagado) no haga fallar siempre la Action y nos llene de correos.
          curl -s -o /dev/null -w "%{http_code}" --max-time 30 https://reluctant-sharia-argenis1412-98799132.koyeb.app/api/v1/sobre || true
